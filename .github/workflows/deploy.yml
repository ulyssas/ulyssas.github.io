name: Deploy pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.commit_id || github.ref }}

      - name: Add Google Search Console verification file
        run: |
          echo "google-site-verification: google22bc69af48e97c4f.html" > google22bc69af48e97c4f.html

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Generate XML Sitemap
        uses: cicirello/generate-sitemap@v1.10.4
        with:
          base-url-path: https://ulyssas.github.io/
          path-to-root: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
